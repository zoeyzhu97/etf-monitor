name: deploy-cloudbase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudbase
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install CloudBase CLI
        run: npm install --global @cloudbase/cli@latest

      - name: Sign in to CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"

      - name: Prepare static site
        run: |
          mkdir -p "$RUNNER_TEMP/etf-monitor-site"
          rsync -a --delete --exclude '.git/' ./ "$RUNNER_TEMP/etf-monitor-site/"

      - name: Deploy static site
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: tcb hosting deploy "$RUNNER_TEMP/etf-monitor-site" / -e "$TCB_ENV_ID"
