name: daily-update
on:
  schedule:
    - cron: '40 7 * * 1-5'   # UTC 07:40 = 北京时间 15:40
    - cron: '0 12 * * 1-5'   # 北京时间 20:00 兜底重试
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-backfill.txt || echo "akshare 安装失败, 指数增量将跳过"
      - name: Fetch ETF shares
        id: fetch
        run: python scripts/fetch_etf_shares.py
        continue-on-error: true
      - name: Fetch index daily (incremental)
        run: python scripts/fetch_index_daily.py || echo "指数更新失败, 保留旧数据"
      - name: Daily comment
        run: python scripts/daily_comment.py
      - name: Event study
        run: python scripts/event_study.py || echo "事件研究跳过(指数数据未就绪)"
      - name: Commit & push
        run: |
          git config user.name "etf-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: $(date -u +%F) auto update"
          git push
      - name: Alert on fetch failure
        if: steps.fetch.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `抓取失败告警 ${new Date().toISOString().slice(0,10)}`,
              body: '份额抓取脚本退出码非0, 请检查数据源字段是否变动。'
            });
