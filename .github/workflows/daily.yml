name: daily-update
on:
  schedule:
    # 避开整点，降低 GitHub Actions 高峰期延迟或漏跑概率。
    - cron: '43 7 * * 1-5'   # 北京时间 15:43：盘后首次尝试
    - cron: '17 12 * * 1-5'  # 北京时间 20:17：晚间重试
    - cron: '17 16 * * 1-5'  # 北京次日 00:17：交易所夜间披露后重试
    - cron: '17 17 * * 1-5'  # 北京次日 01:17：迟到源重试
    - cron: '17 18 * * 1-5'  # 北京次日 02:17：最终检查
  workflow_dispatch:

concurrency:
  group: daily-update
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-backfill.txt || echo "akshare 安装失败, 指数增量将跳过"
      - name: Fetch ETF shares
        id: fetch
        run: python scripts/fetch_etf_shares.py
        continue-on-error: true
      - name: Fetch index daily (incremental)
        run: python scripts/fetch_index_daily.py || echo "指数更新失败, 保留旧数据"
      - name: Event study
        run: python scripts/event_study.py || echo "事件研究跳过(指数数据未就绪)"
      - name: Daily multi-model assessment
        run: python scripts/daily_assessment.py
      - name: Daily comment
        run: python scripts/daily_comment.py
      - name: Check ETF data freshness
        id: freshness
        run: python scripts/check_data_freshness.py
        continue-on-error: true
      - name: Commit & push
        run: |
          git config user.name "etf-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: $(date -u +%F) auto update"
          git push
      - name: Alert on fetch failure
        if: steps.fetch.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `抓取失败告警 ${new Date().toISOString().slice(0,10)}`,
              body: '份额抓取脚本退出码非0, 请检查数据源字段是否变动。'
            });
      - name: Alert on stale ETF date
        if: >-
          steps.freshness.outcome == 'failure' &&
          (github.event_name == 'workflow_dispatch' || github.event.schedule == '17 18 * * 1-5')
        uses: actions/github-script@v7
        env:
          FRESHNESS_MESSAGE: ${{ steps.freshness.outputs.message }}
        with:
          script: |
            const title = `ETF日期滞后告警 ${new Date().toISOString().slice(0,10)}`;
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            if (!openIssues.some(issue => issue.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: process.env.FRESHNESS_MESSAGE || '北京次日02:17最终重试后ETF份额日期仍滞后。'
              });
            }
      - name: Fail final run when ETF data is stale
        if: >-
          steps.freshness.outcome == 'failure' &&
          (github.event_name == 'workflow_dispatch' || github.event.schedule == '17 18 * * 1-5')
        run: |
          echo "ETF份额未全部更新到应有交易日；最终任务标记失败，不能再显示绿色假成功。"
          exit 1
